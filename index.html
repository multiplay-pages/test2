<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procedura potwierdzenia wypowiedzenia – Multiplay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ══════════════ HEADER ══════════════ -->
  <header class="site-header" role="banner">
    <div class="header-inner">

      <a href="#" class="header-logo-link" aria-label="Multiplay – strona główna narzędzia">
        <img
          src="logo1.png"
          alt="Multiplay"
          class="site-logo"
          width="180"
          height="72"
        >
      </a>

      <div class="header-text">
        <h1 class="site-title">Procedura potwierdzenia wypowiedzenia</h1>
        <p class="site-subtitle">Narzędzie operacyjne&ensp;·&ensp;Dział Obsługi Klienta</p>
      </div>

      <!-- Dekoracyjny watermark — ikona marki -->
      <img
        src="Ikonyy-3-1024x1024.png"
        alt=""
        class="header-deco"
        aria-hidden="true"
        role="presentation"
      >

    </div>

    <!-- Multiplay brand stripe -->
    <div class="header-stripe" aria-hidden="true">
      <span class="stripe stripe--y"></span>
      <span class="stripe stripe--r"></span>
      <span class="stripe stripe--g"></span>
    </div>
  </header>
  <!-- /HEADER -->


  <!-- ══════════════ PAGE WRAPPER ══════════════ -->
  <div class="page-wrapper">

    <!-- ── MAIN FLOW ── -->
    <main class="main-flow" id="main" role="main">

      <!-- ─ KROK 1: Kanał ─ -->
      <section class="flow-section" id="section-step1">
        <div class="section-label">
          <span class="step-badge" aria-hidden="true">1</span>
          <h2 class="section-heading">Jak otrzymano wypowiedzenie?</h2>
        </div>
        <div
          class="cards-grid"
          id="cards-level1"
          role="listbox"
          aria-label="Wybierz sposób otrzymania wypowiedzenia"
        >
          <!-- JS -->
        </div>
      </section>

      <!-- ─ KROK 2: Szczegóły ─ -->
      <section
        class="flow-section hidden"
        id="section-step2"
        aria-live="polite"
        aria-label="Krok 2 – doprecyzuj sytuację"
      >
        <div class="step-connector" aria-hidden="true">
          <svg width="18" height="36" viewBox="0 0 18 36" fill="none">
            <line x1="9" y1="0" x2="9" y2="36"
              stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4 3"/>
          </svg>
        </div>
        <div class="section-label">
          <span class="step-badge" aria-hidden="true">2</span>
          <h2 class="section-heading">Doprecyzuj sytuację</h2>
        </div>
        <div
          class="cards-grid"
          id="cards-level2"
          role="listbox"
          aria-label="Wybierz szczegóły sytuacji"
        >
          <!-- JS -->
        </div>
      </section>

      <!-- ─ WYNIK PROCEDURY ─ -->
      <section
        class="flow-section hidden"
        id="section-result"
        aria-live="polite"
        aria-label="Wynik procedury"
      >
        <div class="step-connector" aria-hidden="true">
          <svg width="18" height="36" viewBox="0 0 18 36" fill="none">
            <line x1="9" y1="0" x2="9" y2="36"
              stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4 3"/>
          </svg>
        </div>
        <div id="result-panel" role="region" aria-label="Wynik i kroki procedury">
          <!-- JS -->
        </div>
      </section>

      <!-- ─ KROK 3: Typ sprawy ─ -->
      <section
        class="flow-section hidden"
        id="section-cases"
        aria-live="polite"
        aria-label="Krok 3 – wybierz typ sprawy"
      >
        <div class="section-label section-label--cases">
          <span class="step-badge step-badge--sub" aria-hidden="true">3</span>
          <div>
            <h2 class="section-heading">Wybierz typ sprawy / umowy</h2>
            <p class="section-hint">Wybierz typ umowy, aby wygenerować szablon wiadomości</p>
          </div>
        </div>
        <div
          class="cards-grid cards-grid--cases"
          id="cards-cases"
          role="listbox"
          aria-label="Wybierz typ umowy"
        >
          <!-- JS -->
        </div>
      </section>

      <!-- ─ SZABLON WIADOMOŚCI ─ -->
      <section
        class="flow-section hidden"
        id="section-template"
        aria-live="polite"
        aria-label="Szablon wiadomości"
      >
        <div id="template-panel" role="region" aria-label="Szablon wiadomości do wysyłki">
          <!-- JS -->
        </div>
      </section>

    </main>
    <!-- /MAIN FLOW -->


    <!-- ── SIDEBAR: LEGENDA ── -->
    <aside class="legend-aside" aria-label="Legenda kanałów obsługi">
      <div class="legend-panel">
        <h3 class="legend-title">Legenda kanałów</h3>
        <ul
          class="legend-list"
          id="legend-list"
          role="list"
          aria-label="Kanały obsługi"
        >
          <!-- JS -->
        </ul>
      </div>
    </aside>
    <!-- /SIDEBAR -->

  </div>
  <!-- /PAGE WRAPPER -->


  <!-- ══════════════ RESET BAR (fixed) ══════════════ -->
  <div class="reset-bar hidden" id="reset-bar" role="complementary" aria-label="Akcje">
    <button type="button" class="btn-reset" id="btn-reset">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M1.5 7a5.5 5.5 0 1 1 1.1 3.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <polyline points="1.5,3.5 1.5,7 5,7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Zacznij od nowa
    </button>
  </div>
  <!-- /RESET BAR -->


  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
